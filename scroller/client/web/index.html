<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Bible scroller app">
  <meta name="theme-color" content="#192c46">
  <meta name="google-signin-client_id" content="315895045315-54809ltm3mnp79qurdl7512c55mvbveo.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bible Scroller">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>

  <title>Bible Scroller</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b1026;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 100%;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #c9a227;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #loading .title {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" aria-live="polite" aria-busy="true">
    <div class="spinner" role="presentation"></div>
    <div class="title">Bible Scroller</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js?v=fixscroll2" async></script>
</body>
</html>
