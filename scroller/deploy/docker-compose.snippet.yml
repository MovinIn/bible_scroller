# Append this service block to ~/docker-compose.yml on the production VM (192.9.142.147).
# Requires: BSCROLLER_DATABASE_URL and BIBLE_BRAIN_API_KEY in ~/.env

  bscroller:
    image: docker.io/movinin/apps:bscroller_backend
    container_name: bscroller
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${BSCROLLER_DATABASE_URL}
      BIBLE_BRAIN_API_KEY: ${BIBLE_BRAIN_API_KEY}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Bible Scroller <noreply@bscroller.navedu.uk>}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOW_CONSOLE_MAILER: ${ALLOW_CONSOLE_MAILER:-false}
      MEDIA_BASE_URL: https://bscroller.navedu.uk
      PIPELINE_MOUNT_ROOT: /output
      PIPELINE_IMAGES_ROOTS: /output/test/images;/output/prod;/output
      SEED_LIMIT: "0"
      SEED_MANIFEST_PATH: /app/data/manifest.json
    volumes:
      - /home/opc/data/bscroller/output:/output:ro
    restart: unless-stopped
